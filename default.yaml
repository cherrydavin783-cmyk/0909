data:
  symbol: XAUUSD
  bars_csv: data/xauusd_m1.csv
  news_csv: data/news.csv
  timezone: Asia/Shanghai
  input_timezone: Asia/Shanghai
  default_spread: 0.30
  point: 0.01
  contract_size: 100.0

calendar:
  provider: fxmacrodata
  auto_sync: true
  output_csv: data/news.csv
  cache_file: data/calendar_cache.xml
  refresh_hours: 6
  lookback_days: 1
  lookahead_days: 7
  source_timezone: UTC
  target_timezone: Asia/Shanghai
  fxmacrodata_url: "https://fxmacrodata.com/api/v1/calendar/USD"
  fxmacrodata_high_impact_releases:
    - policy_rate
    - non_farm_payrolls
    - unemployment
    - employment
    - inflation
    - core_inflation
    - inflation_mom
    - core_inflation_mom
    - pce
    - pce_mom
    - gdp
    - ppi
    - ppi_mom
    - retail_sales
    - durable_goods_orders
    - consumer_sentiment
    - job_openings
    - pmi
    - nmi
  forex_factory_url: "https://nfs.faireconomy.media/ff_calendar_thisweek.xml"
  trading_economics_client:
  trading_economics_client_env: TRADING_ECONOMICS_CLIENT
  trading_economics_country: "united states"
  trading_economics_importance: 3
  bls_schedule_url: "https://www.bls.gov/schedule/{year}/home.htm"
  fred_calendar_url: "https://fred.stlouisfed.org/releases/calendar"
  fomc_calendar_url: "https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm"

cross_assets:
  enabled: true
  csv_path: data/cross_assets.csv
  neutral_if_missing: true
  block_on_conflict: false
  require_confirmation: false
  dxy_column: dxy
  yield_column: us10y
  momentum_lookback: 20
  asof_tolerance_minutes: 4320
  dxy_min_change: 0.05
  yield_min_change: 0.01
  required_components: 2

indicators:
  atr_period: 14
  atr_quantile_lookback: 500
  rsi_period: 14
  ofi_window: 20
  vpin_window: 50
  vpin_quantile_lookback: 500
  volume_window: 20
  volume_spike_factor: 1.5
  fair_value_window: 20
  spread_window: 50

strategies:
  breakout:
    enabled: true
    asia_range_start: "06:00"
    asia_range_end: "16:00"
    trade_start: "20:00"
    trade_end: "21:30"
    min_asia_width: 25.0
    min_rsi: 40.0
    max_rsi: 60.0
    stop_atr_multiple: 0.8
    take_profit_atr_multiple: 2.4
    max_holding_minutes: 10
    max_daily_trades: 8
  mean_reversion:
    enabled: false
    windows:
      - ["01:00", "03:00"]
      - ["06:00", "07:00"]
    ofi_ratio_threshold: 3.0
    fair_value_atr_deviation: 0.25
    max_vpin_quantile: 0.70
    stop_atr_multiple: 0.5
    max_stop_distance: 5.0
    max_holding_minutes: 5
  micro_scalp:
    enabled: false
    windows:
      - ["20:00", "21:30"]
    lookback: 8
    min_asia_width: 25.0
    min_rsi_long: 55.0
    max_rsi_short: 45.0
    min_ofi_abs: 50.0
    max_vpin_quantile: 0.75
    require_volume_spike: true
    stop_atr_multiple: 0.45
    take_profit_atr_multiple: 0.65
    max_holding_minutes: 3
    max_daily_trades: 20
    risk_per_trade: 0.002

filters:
  toxic_vpin_quantile: 0.90
  max_atr_abs: 15.0
  max_atr_quantile: 0.95
  max_spread_multiple: 1.5
  max_spread_abs: 2.5
  max_slippage_abs: 2.0
  news_before_minutes: 15
  news_after_minutes: 30
  news_currencies: ["USD"]
  news_impacts: ["high"]

risk:
  initial_equity: 10000.0
  risk_per_trade: 0.015
  profit_target_equity_pct: 0.0
  breakeven_trigger_price_pct: 0.0015
  breakeven_buffer_points: 2.0
  max_daily_drawdown: 0.03
  min_volume: 0.01
  max_volume: 10.0
  volume_step: 0.01
  commission_per_lot: 3.5
  slippage_abs: 0.05
  max_quote_gap_minutes: 10

report:
  output_dir: reports

mt5:
  terminal_path: "C:\\Program Files\\MetaTrader 5\\terminal64.exe"
  live_trading_enabled: false
  poll_seconds: 5
  history_bars: 600

ibkr:
  host: 127.0.0.1
  port: 4002
  client_id: 77
  timeout_seconds: 30
  gateway_path: "C:\\Jts\\ibgateway\\1046\\ibgateway.exe"
  duration: "2 D"
  bar_size: "5 mins"
  what_to_show: TRADES
  use_rth: false
  dxy_contract:
    symbol: UUP
    secType: STK
    exchange: SMART
    currency: USD
    primaryExchange: ARCA
  yield_contract:
    symbol: IEF
    secType: STK
    exchange: SMART
    currency: USD
    primaryExchange: NASDAQ
  yield_transform: inverse_price
